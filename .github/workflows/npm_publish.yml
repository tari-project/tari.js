---
# Publishing the package to the npm registry when the version number changes
# See https://github.com/marketplace/actions/npm-publish for more information
name: Publish Package to npmjs

on:
  push:
    branches: main

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Publish all modules to NPM
        run: |
          set -euo pipefail

          # Use the core SDK package as the version sentinel.
          # All workspace packages share the same version (enforced by check_versions.sh).
          SENTINEL="@tari-project/ootle"
          LOCAL_VERSION=$(node -p "require('./packages/ootle/package.json').version")

          echo "Sentinel package: $SENTINEL"
          echo "Local version:    $LOCAL_VERSION"

          REMOTE_VERSION=$(pnpm info "$SENTINEL" version 2>/dev/null || echo "NOT_FOUND")
          echo "Remote version:   $REMOTE_VERSION"

          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            exit 0
          fi

          echo "== Publishing =="
          pnpm publish --provenance -r --no-git-checks
